name: lint
on:
  push:
    branches:
      - 'master'
    paths-ignore:
      - '/readme.md'
  pull_request:
    branches:
      - '*'
    paths-ignore:
      - '/readme.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        step: [lint, unit, mozilla]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'yarn'
    - name: Setup
      run: yarn install --frozen-lockfile
    - name: ${{ matrix.step }}
      env:
        STEP: ${{ matrix.step }}
      run: bash -c ./ci/$STEP.sh
